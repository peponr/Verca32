<!DOCTYPE html> <html lang="sk"> <head> <meta charset="utf-8"> <meta name="viewport"
content="width=device-width, initial-scale=1">
<title>Happy Birthday Geocaching</title>
<link rel="stylesheet" href="style.css"> </head>
<body>
<!-- HOME -->
<div id="home" class="screen active">
<div class="header"> <h1>🎂 Happy Birthday Geocaching</h1>
<div> 👤 Ferčiatko </div>
<div> 📍 0 / 13 kešiek </div> </div>
<div class="carousel">
<div class="card">
<img src="spalna.jpg">
<div class="content">
<h2>🛏️ Spálňa</h2>
<div> 📍 📍 ❓ </div>
<br>
<button class="btn" onclick="showScreen('spalna')"> Vstúpiť </button>
</div> </div>
<div class="card">
<img src="obyvacka.jpg" class="locked">
<div class="content">
<h2> 🔒 Obývačka </h2>
<p> Najprv dokonči spálňu </p>
</div> </div>
<div class="card">
<img src="kuchyna.jpg" class="locked">
<div class="content">
<h2> 🔒 Kuchyňa </h2>
</div> </div>
<div class="card">
<img src="lodzia.jpg" class="locked">
<div class="content">
<h2> 🔒 Lodžia </h2>
</div> </div>
</div>
</div>
<!-- SPALNA -->
<div id="spalna" class="screen">
<button class="btn" onclick="showScreen('home')"> ← Späť </button>
<br><br>
<div class="room-image">
<img src="spalna.jpg">
<button
    class="cache-pin pin-smilstvo"
    onclick="openCache('smilstvo')">
    📍
</button>
<button class="cache-pin pin-yucca"> 📍 </button>
<button class="cache-pin pin-pig"> ❓ </button>
</div>
</div>
<div
    id="cache"
    class="screen">

    <div
        id="cache-content"
        class="cache-content">
    </div>
</div>
<div
    id="cache"
    class="screen">

    <div
        id="cache-content"
        class="cache-content">
    </div>
</div>
<script src="app.js"></script>
</body> </html>
