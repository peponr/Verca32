<!DOCTYPE html> <html lang="sk"> <head> <meta charset="utf-8"> <meta name="viewport"
content="width=device-width, initial-scale=1">
<title>Happy Birthday Geocaching</title>
<link rel="stylesheet" href="style.css"> </head>
<body>
<!-- HOME -->
<div id="home" class="screen active">
<div class="header"> <h1>🎂 Birthday Geocaching dob</h1>
<div> 👤 Ferčiatko </div>
<div> <div id="progress-text">
    📍 0 / 13 kešiek
</div>
<button
        class="btn"
        onclick="resetProgress()">
        🔄 Reset progresu
 </button>
 </div> </div>
<div class="carousel">
<div class="card">
<img src="spalna.jpg">
<div class="content">
<h2>🛏️ Spálňa</h2>
<div id="spalna-icons">
    📍 📍 ❓
</div>
<br>
<button class="btn" onclick="showScreen('spalna')"> Vstúpiť </button>
</div> </div>
<div class="card">
<img src="obyvacka.jpg" class="locked" id="living-room-card">
<div class="content">
<h2 id="living-room-title">
    🔒 Obývačka
</h2>
<p id="living-room-text">Najprv dokonči spálňu</p>
<div id="living-room-icons">

📍 🌍 📍 ❓

</div>
<br>
<div id="living-room-button">
</div>
</div> </div>
<div class="card">

    <img
        src="kuchyna.jpg"
        class="locked"
        id="kitchen-card">

    <div class="content">

        <h2 id="kitchen-title">
            🔒 Kuchyňa
        </h2>

        <p id="kitchen-text">
            Najprv dokonči obývačku
        </p>

        <div id="kitchen-icons">
        </div>
<br>
        <div id="kitchen-button">
        </div>

</div></div>
<div class="card">

    <img
        src="lodzia.jpg"
        class="locked"
        id="balcony-card">

    <div class="content">

        <h2 id="balcony-title">
            🔒 Lodžia
        </h2>

        <p id="balcony-text">
            Najprv dokonči kuchyňu
        </p>

        <div id="balcony-icons">
        </div>

        <br>

        <div id="balcony-button">
        </div>

    </div>

</div>
</div>
</div>
<!-- SPALNA -->
<div id="spalna" class="screen">
<button class="btn" onclick="showScreen('home')"> ← Späť </button>
<br><br>
<div class="room-image">
<img src="spalna.jpg">
<button
    class="cache-pin pin-smilstvo"
    id="pin-smilstvo"
    onclick="openCache('smilstvo')">
    📍
</button>
    <br><br>
<button
    class="cache-pin pin-yucca"
    id="pin-yucca"
    onclick="openCache('yucca')">
    📍
</button>
<button
    class="cache-pin pin-pig"
    id="pin-pig"
    onclick="openCache('pig')">
    ❓
</button>
</div>
</div>
<div id="obyvacka" class="screen">

    <button
        class="btn"
        onclick="showScreen('home')">
        ← Späť
    </button>

    <br><br>

<div class="room-image">

    <img src="obyvacka.jpg">

    <button
        class="cache-pin pin-lenivost"
        id="pin-lenivost"
        onclick="openCache('lenivost')">
        📍
    </button>
    
    <button
    class="cache-pin pin-london"
    id="pin-london"
    onclick="openCache('london')">
    🌍
    </button>

<button
    class="cache-pin pin-strelitzia"
    id="pin-strelitzia"
    onclick="openCache('strelitzia')">
    📍
</button>
<button
    class="cache-pin pin-knihomol"
    id="pin-knihomol"
    onclick="openCache('knihomol')">
    ❓
</button>
</div></div>
<div id="kuchyna" class="screen">

    <button
        class="btn"
        onclick="showScreen('home')">
        ← Späť
    </button>

    <br><br>

    <div class="room-image">

    <img src="kuchyna.jpg">

    <button
        class="cache-pin pin-pizza"
        id="pin-pizza"
        onclick="openCache('pizza')">
        📍
    </button>
<button
    class="cache-pin pin-obzerstvo"
    id="pin-obzerstvo"
    onclick="openCache('obzerstvo')">
    📍
</button>
<button
    class="cache-pin pin-epipremnum"
    id="pin-epipremnum"
    onclick="openCache('epipremnum')">
    ❓
</button>
<button
    class="cache-pin pin-zima"
    id="pin-zima"
    onclick="openCache('zima')">
    ❓
</button>
</div></div>
<div id="lodzia" class="screen">

    <button
        class="btn"
        onclick="showScreen('home')">
        ← Späť
    </button>

    <br><br>

    <div class="room-image">

        <img src="lodzia.jpg">
<button
    class="cache-pin pin-dobdob"
    id="pin-dobdob"
    onclick="openCache('dobdob')">
    📍
</button>
    </div>

</div>
<div
    id="cache"
    class="screen">

    <div
        id="cache-content"
        class="cache-content">
    </div>
</div>
<script src="app.js"></script>
</body> </html>
