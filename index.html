<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>v0.3</title><style>body{margin:0;background:#08110b;color:#fff;font-family:sans-serif}.header{padding:16px}.cards{display:flex;overflow-x:auto;gap:16px;padding:16px}.card{min-width:85%;background:#132017;border-radius:20px;overflow:hidden}.card img{width:100%;height:220px;object-fit:cover}.locked{filter:grayscale(1) blur(2px);opacity:.5}.content{padding:12px}.btn{background:#2ecc71;color:#fff;border:none;border-radius:12px;padding:12px;width:100%}.screen{display:none}.active{display:block}.roomimg{position:relative}.roomimg img{width:100%;height:320px;object-fit:cover}.iconbtn{position:absolute;width:44px;height:44px;border-radius:50%}.i1{left:25%;top:60%}.i2{right:20%;top:25%}.i3{left:55%;top:45%}</style></head><body><div id="home" class="screen active"><div class="header"><h2>🎂 Happy Birthday Geocaching</h2><div>👤 Ferčiatko</div><div>📍 <span id="count">0</span>/13</div></div><div class="cards"><div class="card"><img src="spalna.jpg"><div class="content"><h3>🛏️ Spálňa</h3><div id="bedprog">0/3</div><button class="btn" onclick="show('room')">Vstúpiť</button></div></div><div class="card"><img class="locked" src="obyvacka.jpg"><div class="content"><h3>🔒 Obývačka</h3></div></div></div><button class="btn" onclick="resetGame()">Reset progresu</button></div><div id="room" class="screen"><button class="btn" onclick="show('home')">← Späť</button><div class="roomimg"><img src="spalna.jpg"><button class="iconbtn i1" onclick="cache('smilstvo')">📍</button><button class="iconbtn i2" onclick="cache('yucca')">📍</button><button class="iconbtn i3" onclick="cache('pig')">❓</button></div></div><div id="cache" class="screen"><div id="cacheContent" style="padding:16px"></div></div><script>const caches={smilstvo:{name:"Smilstvo",hint:"vnútri",type:"trad"},yucca:{name:"Yucca",hint:"pod zemou",type:"trad"},pig:{name:"Pink Pig Mystery",hint:"-",type:"mystery"}};function show(i){document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));document.getElementById(i).classList.add("active");update()}function getDone(){return JSON.parse(localStorage.getItem("hbgeo")||"{}")}function saveDone(d){localStorage.setItem("hbgeo",JSON.stringify(d))}function logCache(id){let d=getDone();d[id]=true;saveDone(d);alert("😊 Keška bola úspešne zalogovaná.");show("home")}function cache(id){let c=caches[id];let h='<button class="btn" onclick="show(\'room\')">← Späť</button><h2>'+c.name+'</h2><p>Hint: '+c.hint+'</p>';if(c.type=="mystery"){h+='<input id="ans" placeholder="odpoveď"><button class="btn" onclick="checkPig()">Overiť</button>'}else{h+='<button class="btn" onclick="logCache(\''+id+'\')">Zalogovať nález</button>'}document.getElementById("cacheContent").innerHTML=h;show("cache")}function checkPig(){if(document.getElementById("ans").value.trim()=="60"){logCache("pig")}else alert("Nesprávna odpoveď")}function update(){let c=Object.keys(getDone()).length;document.getElementById("count").innerText=c;document.getElementById("bedprog").innerText=c+"/3"}function resetGame(){localStorage.removeItem("hbgeo");update()}update();</script></body></html>
